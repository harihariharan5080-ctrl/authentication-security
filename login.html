<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login - CRT Industries</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background-color: #0B0F19;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 15px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="glass-card p-4 py-5 shadow-lg border border-dark-blue">
            <div class="text-center mb-4">
                <div class="brand-logo mb-3">
                    <i class="bi bi-shield-lock-fill text-primary-glow fs-1"></i>
                </div>
                <h4 class="brand-title text-white fw-bold mb-1">CRT INDUSTRIES</h4>
                <p class="brand-subtitle text-muted text-uppercase small tracking-wide">Chemical Lab Secure Console</p>
            </div>

            {% if error %}
            <div class="alert alert-danger-custom d-flex align-items-center mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <div>{{ error }}</div>
            </div>
            {% endif %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group mb-4">
                    <label for="email" class="form-label text-silver small mb-2">Admin Login ID</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent text-silver border-end-0 border-dark-blue">
                            <i class="bi bi-person-fill"></i>
                        </span>
                        <input type="text" class="form-control border-start-0 border-dark-blue bg-transparent text-white" id="email" name="email" placeholder="Enter Login ID" required autocomplete="username">
                    </div>
                </div>

                <div class="form-group mb-4">
                    <label for="password" class="form-label text-silver small mb-2">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent text-silver border-end-0 border-dark-blue">
                            <i class="bi bi-key-fill"></i>
                        </span>
                        <input type="password" class="form-control border-start-0 border-dark-blue bg-transparent text-white" id="password" name="password" placeholder="Enter security password" required autocomplete="current-password">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary-custom w-100 py-3 fw-semibold">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Authenticate
                </button>
            </form>

            <div class="text-center mt-4 pt-2">
                <span class="text-muted small"><i class="bi bi-lock-fill me-1"></i>Secure Local Environment</span>
            </div>
        </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
